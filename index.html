<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Builder — Montreal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#0D1117; --bg2:#161B22; --bg3:#1C2128; --bg4:#21262D;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
  --text:#E6EDF3; --text2:#8B949E; --text3:#484F58;
  --blue:#58A6FF; --blue-bg:rgba(88,166,255,0.10); --blue-glow:rgba(88,166,255,0.25);
  --green:#3FB950; --green-bg:rgba(63,185,80,0.10); --green-dim:rgba(63,185,80,0.06);
  --amber:#E3B341; --amber-bg:rgba(227,179,65,0.10);
  --red:#F85149; --purp:#BC8CFF; --purp-bg:rgba(188,140,255,0.10);
  --radius:10px; --radius-lg:16px; --radius-xl:20px;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
}

html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

.shell { max-width: 1140px; margin: 0 auto; padding: 0 20px 80px; }

/* Header */
.header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
.wordmark { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 6px; }
.tagline { font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
.tagline span { color: var(--green); }
.header-meta { font-size: 13px; color: var(--text3); font-family: var(--mono); }

/* KPI strip */
.kpi-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 28px; }
@media(max-width:720px){ .kpi-strip { grid-template-columns: 1fr 1fr; } }
@media(max-width:420px){ .kpi-strip { grid-template-columns: 1fr; } }

.kpi { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; transition: border-color .2s, transform .15s; position: relative; overflow: hidden; animation: slideIn .3s ease both; }
.kpi:nth-child(1){animation-delay:.05s} .kpi:nth-child(2){animation-delay:.10s} .kpi:nth-child(3){animation-delay:.15s} .kpi:nth-child(4){animation-delay:.20s}
@keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.kpi::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; border-radius:2px 2px 0 0; }
.kpi.green::before{background:var(--green)} .kpi.blue::before{background:var(--blue)} .kpi.amber::before{background:var(--amber)} .kpi.purp::before{background:var(--purp)}
.kpi:hover { border-color: var(--border2); transform: translateY(-1px); }
.kpi-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; font-weight:500; }
.kpi-value { font-size:24px; font-weight:600; font-family:var(--mono); letter-spacing:-0.5px; line-height:1; }
.kpi.green .kpi-value{color:var(--green)} .kpi.blue .kpi-value{color:var(--blue)} .kpi.amber .kpi-value{color:var(--amber)} .kpi.purp .kpi-value{color:var(--purp)}
.kpi-sub { font-size:11px; color:var(--text3); margin-top:5px; font-family:var(--mono); }

/* Nav */
.nav { display:flex; gap:2px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:4px; margin-bottom:24px; overflow-x:auto; }
.nav-btn { flex:1; min-width:90px; padding:9px 16px; font-size:13px; font-weight:500; font-family:var(--font); color:var(--text2); background:transparent; border:none; border-radius:var(--radius); cursor:pointer; white-space:nowrap; transition:all .18s; }
.nav-btn:hover { color:var(--text); background:var(--bg3); }
.nav-btn.active { color:var(--text); background:var(--bg4); box-shadow:0 1px 4px rgba(0,0,0,.4); }

/* Panels */
.panel { display:none; animation: fadeUp .25s ease; }
.panel.active { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-xl); padding:24px; margin-bottom:16px; }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.card-title { font-size:15px; font-weight:600; }
.card-sub { font-size:12px; color:var(--text3); margin-top:2px; }
.section-label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
@media(max-width:680px){ .two-col{grid-template-columns:1fr} }
@media(max-width:520px){ .three-col{grid-template-columns:1fr 1fr} }

/* Input field rows */
.field-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px 16px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); transition:border-color .2s,background .2s; margin-bottom:8px; cursor:text; }
.field-row:hover { border-color:var(--border2); }
.field-row:focus-within { border-color:var(--blue); background:var(--bg2); box-shadow:0 0 0 3px var(--blue-glow); }
.field-row:focus-within .field-label { color:var(--blue); }
.field-left { flex:1; min-width:0; }
.field-label { font-size:13px; color:var(--text2); font-weight:400; transition:color .2s; }
.field-note { font-size:11px; color:var(--text3); margin-top:1px; font-family:var(--mono); }
.field-right { display:flex; align-items:center; gap:4px; }
.field-prefix { font-size:13px; color:var(--text3); font-family:var(--mono); flex-shrink:0; }
.field-input { background:transparent; border:none; outline:none; font-size:16px; font-weight:600; font-family:var(--mono); color:var(--blue); text-align:right; width:110px; padding:0; }
.field-input::placeholder { color:var(--text3); }
.field-input::-webkit-inner-spin-button, .field-input::-webkit-outer-spin-button { -webkit-appearance:none; }

/* Calc rows */
.calc-row { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:var(--bg3); border-radius:var(--radius); margin-bottom:6px; }
.calc-row .lbl { font-size:13px; color:var(--text2); }
.calc-row .val { font-size:14px; font-weight:600; font-family:var(--mono); color:var(--text); transition:color .3s; }
.calc-row.highlight { background:var(--green-bg); }
.calc-row.highlight .val { color:var(--green); }
.calc-row.amber-row { background:var(--amber-bg); }
.calc-row.amber-row .val { color:var(--amber); }
.divider { height:1px; background:var(--border); margin:16px 0; }

/* Badges */
.badge { display:inline-flex; align-items:center; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; }
.badge-green{background:var(--green-bg);color:var(--green)} .badge-blue{background:var(--blue-bg);color:var(--blue)} .badge-amber{background:var(--amber-bg);color:var(--amber)} .badge-gray{background:var(--bg4);color:var(--text3)}

/* Progress */
.prog-wrap { margin-bottom:14px; }
.prog-meta { display:flex; justify-content:space-between; font-size:12px; color:var(--text3); margin-bottom:6px; }
.prog-meta .prog-label { color:var(--text2); font-weight:500; }
.prog-bg { height:6px; background:var(--bg4); border-radius:3px; overflow:hidden; }
.prog-fill { height:6px; border-radius:3px; transition:width .6s cubic-bezier(.4,0,.2,1); }

/* Month grid */
.month-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
.month-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-xl); padding:20px; transition:border-color .2s; }
.month-card:hover { border-color:var(--border2); }
.month-card.current { border-color:rgba(88,166,255,.4); box-shadow:0 0 0 1px rgba(88,166,255,.15),0 4px 20px rgba(88,166,255,.08); }
.month-card.april { border-color:rgba(227,179,65,.35); }
.month-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.month-name { font-size:14px; font-weight:600; }

/* Alloc bars */
.alloc { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.alloc-label { font-size:11px; color:var(--text3); width:76px; flex-shrink:0; }
.alloc-bar-bg { flex:1; height:3px; background:var(--bg4); border-radius:2px; overflow:hidden; }
.alloc-bar { height:3px; border-radius:2px; transition:width .4s ease; }
.alloc-amount { font-size:11px; font-family:var(--mono); font-weight:500; width:52px; text-align:right; flex-shrink:0; }

/* Month inputs */
.month-inputs { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:14px; }
.month-inputs.april-grid { grid-template-columns:1fr 1fr 1fr 1fr; }
.minput-wrap { position:relative; }
.minput-label { font-size:10px; color:var(--text3); font-weight:600; letter-spacing:.07em; text-transform:uppercase; margin-bottom:5px; }
.dollar-pfx { position:absolute; left:9px; bottom:11px; font-size:13px; color:var(--text3); font-family:var(--mono); pointer-events:none; }
.minput { width:100%; padding:10px 10px 10px 20px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); font-size:14px; font-weight:600; font-family:var(--mono); color:var(--blue); outline:none; transition:border-color .2s,background .2s,box-shadow .2s; }
.minput.amber-inp { color:var(--amber); }
.minput:focus { border-color:var(--blue); background:var(--bg2); box-shadow:0 0 0 3px var(--blue-glow); }
.minput.amber-inp:focus { border-color:var(--amber); box-shadow:0 0 0 3px var(--amber-bg); }
.minput::-webkit-inner-spin-button,.minput::-webkit-outer-spin-button{-webkit-appearance:none}
.minput::placeholder { color:var(--text3); font-weight:400; }

/* Checks */
.check-list { margin-top:12px; display:flex; flex-direction:column; gap:3px; }
.check-item { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:8px; cursor:pointer; transition:background .15s; font-size:12px; color:var(--text2); user-select:none; }
.check-item:hover { background:var(--bg3); }
.check-item.checked { color:var(--text3); text-decoration:line-through; }
.chk-box { width:16px;height:16px; border:1.5px solid var(--border2); border-radius:4px; display:flex;align-items:center;justify-content:center; flex-shrink:0; transition:all .15s; }
.check-item.checked .chk-box { background:var(--green); border-color:var(--green); }
.chk-svg { display:none; }
.check-item.checked .chk-svg { display:block; }

.mnote { width:100%; margin-top:12px; padding:9px 12px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); font-size:12px; color:var(--text2); font-family:var(--font); resize:none; height:46px; outline:none; transition:border-color .2s; }
.mnote:focus { border-color:var(--border2); }
.mnote::placeholder { color:var(--text3); }
.month-footer { display:flex; justify-content:space-between; align-items:center; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); font-size:12px; color:var(--text3); }
.ftotal { font-family:var(--mono); font-weight:600; color:var(--text); font-size:14px; }

.april-note { background:var(--amber-bg); border:1px solid rgba(227,179,65,.2); border-radius:var(--radius); padding:9px 12px; font-size:12px; color:var(--amber); margin-bottom:12px; }

/* Budget */
.bsection-title { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; padding:6px 16px 6px; margin-top:8px; }
.budget-line { display:flex; justify-content:space-between; align-items:center; padding:10px 16px; border-radius:var(--radius); font-size:13px; transition:background .15s; }
.budget-line:hover { background:var(--bg3); }
.budget-line .blabel { color:var(--text2); }
.budget-line .bval { font-family:var(--mono); font-weight:600; color:var(--text); }
.budget-line.subtotal { background:var(--bg3); margin:4px 0; }
.budget-line.subtotal .blabel { color:var(--text); font-weight:500; }
.budget-line.invest .bval { color:var(--green); }
.budget-line.total { background:var(--green-dim); border:1px solid rgba(63,185,80,.2); margin-top:8px; }
.budget-line.total .blabel { font-weight:600; }
.budget-line.total .bval { color:var(--green); font-size:16px; }
.budget-line.amber-line .bval { color:var(--amber); }

/* Mini stats */
.mini-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
.mini-stat { background:var(--bg3); border-radius:var(--radius); padding:14px 16px; border:1px solid var(--border); }
.ms-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.07em; margin-bottom:5px; font-weight:500; }
.ms-value { font-size:18px; font-weight:600; font-family:var(--mono); }
.ms-sub { font-size:10px; color:var(--text3); margin-top:3px; font-family:var(--mono); }

/* Tables */
.table-scroll { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { padding:10px 14px; text-align:right; font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; border-bottom:1px solid var(--border); white-space:nowrap; }
thead th:first-child { text-align:left; }
tbody td { padding:10px 14px; text-align:right; color:var(--text2); font-family:var(--mono); font-size:12px; border-bottom:1px solid var(--border); }
tbody td:first-child { text-align:left; color:var(--text); font-family:var(--font); font-size:13px; }
tbody tr:hover td { background:var(--bg3); }
tbody tr.april-tr td { color:var(--amber); }
tbody tr.april-tr { background:rgba(227,179,65,.04); }
.cum-td { color:var(--green)!important; font-weight:600!important; }
.tfoot-row td { border-top:2px solid var(--border2); color:var(--text)!important; font-weight:600!important; background:var(--bg3); }
.port-td{color:var(--blue)!important} .re-td{color:var(--amber)!important} .nw-td{color:var(--green)!important;font-weight:600!important}
tbody tr.proj-milestone { background:rgba(227,179,65,.05)!important; }
tbody tr.proj-milestone td:first-child { color:var(--amber)!important; font-family:var(--font)!important; }

/* Chart */
.chart-wrap { position:relative; width:100%; height:300px; margin-top:8px; }
.legend { display:flex; flex-wrap:wrap; gap:16px; font-size:12px; color:var(--text3); margin-bottom:12px; }
.legend span { display:flex; align-items:center; gap:6px; }
.ldot { width:10px; height:10px; border-radius:2px; display:inline-block; flex-shrink:0; }

/* Info box */
.info-box { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; font-size:12px; color:var(--text2); line-height:1.7; margin-top:12px; }
.info-box strong { color:var(--text); font-weight:600; }

/* How to use */
.step { display:flex; gap:16px; padding:16px 0; border-bottom:1px solid var(--border); align-items:flex-start; }
.step:last-child { border-bottom:none; }
.step-num { width:28px;height:28px; border-radius:50%; background:var(--blue-bg); border:1px solid rgba(88,166,255,.25); color:var(--blue); font-size:11px; font-weight:700; display:flex;align-items:center;justify-content:center; flex-shrink:0; margin-top:2px; }
.step-title { font-size:14px; font-weight:600; margin-bottom:3px; }
.step-desc { font-size:13px; color:var(--text2); line-height:1.6; }
.multiplier { display:flex; gap:12px; padding:14px 16px; background:var(--bg3); border-radius:var(--radius); border-left:3px solid transparent; margin-bottom:8px; }
.mult-icon { font-size:18px; flex-shrink:0; margin-top:1px; }
.mult-title { font-size:13px; font-weight:600; margin-bottom:2px; }
.mult-desc { font-size:12px; color:var(--text2); }
.ci { display:flex; gap:10px; padding:10px 14px; border-radius:var(--radius); font-size:13px; margin-bottom:6px; align-items:center; background:var(--bg3); }
.ci-dot { width:6px;height:6px; border-radius:50%; flex-shrink:0; }
.tl-item { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
.tl-item:last-child { border-bottom:none; }
.tl-yr { min-width:64px; font-size:11px; font-family:var(--mono); font-weight:600; }
.tl-content .tl-title { font-size:13px; font-weight:600; margin-bottom:2px; }
.tl-content .tl-desc { font-size:12px; color:var(--text2); }

/* CC Calendar */
.cc-cycle-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; margin-bottom:16px; }
.cc-month-block { background:var(--bg3); border-radius:var(--radius-lg); padding:16px 18px; border:1px solid var(--border); position:relative; overflow:hidden; }
.cc-month-block.current-mo { border-color:rgba(88,166,255,.4); box-shadow:0 0 0 1px rgba(88,166,255,.15); }
.cc-month-block::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; }
.cc-month-block.current-mo::before { background:var(--blue); }
.cc-month-block.past-mo::before { background:var(--green); }
.cc-month-block.future-mo::before { background:var(--text3); }
.cc-month-name { font-size:13px; font-weight:600; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.cc-timeline { display:flex; flex-direction:column; gap:6px; }
.cc-event { display:flex; gap:10px; align-items:flex-start; font-size:12px; }
.cc-date-badge { min-width:36px; text-align:center; font-family:var(--mono); font-size:11px; font-weight:700; padding:2px 6px; border-radius:6px; flex-shrink:0; }
.cc-ev-label { color:var(--text2); line-height:1.4; }
.cc-ev-label strong { color:var(--text); }
.cc-ev-label em { font-style:normal; color:var(--amber); }
.cc-ev-label .tip { display:block; font-size:10px; color:var(--text3); margin-top:1px; }

.cc-action-box { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 18px; margin-bottom:12px; }
.cc-action-title { font-size:13px; font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.cc-action-steps { display:flex; flex-direction:column; gap:6px; }
.cc-step { display:flex; gap:10px; align-items:flex-start; font-size:12px; color:var(--text2); }
.cc-step-num { width:20px; height:20px; border-radius:50%; background:var(--blue-bg); border:1px solid rgba(88,166,255,.3); color:var(--blue); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.cc-step-txt strong { color:var(--text); }
@keyframes numFlash { 0%{opacity:.4} 100%{opacity:1} }
.flash { animation:numFlash .4s ease; }

/* Quote banner */
.quote-banner {
  width: 100%;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 13px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  position: relative;
}
.quote-slot {
  position: relative;
  width: 100%;
  max-width: 900px;
  text-align: center;
  height: 20px;
}
.quote-visible {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: opacity 1.2s ease;
}
.quote-visible.hide { opacity: 0; pointer-events: none; }
.quote-visible.show { opacity: 1; }
.q-text {
  font-size: 12px;
  color: var(--text2);
  font-style: italic;
  letter-spacing: 0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 680px;
}
.q-sep { color: var(--text3); font-size: 11px; flex-shrink:0; }
.q-attr {
  font-size: 10px;
  color: var(--text3);
  font-family: var(--mono);
  letter-spacing: 0.05em;
  white-space: nowrap;
  flex-shrink: 0;
}
@media(max-width:600px){ .q-text { white-space:normal; font-size:11px; } .quote-slot { height:auto; min-height:20px; } }

/* ── Credit Score Tab ──────────────────────────────────────────────── */
.score-hero { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
@media(max-width:600px){ .score-hero { grid-template-columns:1fr; } }

.score-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-xl);
  padding:28px 24px; display:flex; flex-direction:column; align-items:center; gap:6px;
  position:relative; overflow:hidden;
}
.score-card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; }
.score-card.eq::before  { background: linear-gradient(90deg,#58A6FF,#3FB950); }
.score-card.tu::before  { background: linear-gradient(90deg,#BC8CFF,#58A6FF); }
.score-bureau { font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); }
.score-num { font-size:52px; font-weight:600; font-family:var(--mono); line-height:1; letter-spacing:-2px; }
.score-card.eq .score-num { color:var(--blue); }
.score-card.tu .score-num { color:var(--purp); }
.score-band { font-size:12px; font-weight:600; padding:3px 10px; border-radius:20px; margin-top:2px; }
.score-delta { font-size:12px; font-family:var(--mono); margin-top:4px; }
.score-delta.up   { color:var(--green); }
.score-delta.down { color:var(--red); }
.score-delta.flat { color:var(--text3); }
.score-goal { font-size:11px; color:var(--text3); margin-top:2px; }

/* gauge arc */
.gauge-wrap { position:relative; width:120px; height:70px; margin:4px 0; }
.gauge-wrap svg { width:120px; height:70px; }

/* entry form */
.entry-form {
  display:grid; grid-template-columns:1fr 1fr 1fr 1fr auto;
  gap:8px; align-items:end; margin-bottom:16px;
}
@media(max-width:680px){ .entry-form { grid-template-columns:1fr 1fr; } }
.ef-group { display:flex; flex-direction:column; gap:5px; }
.ef-label { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.07em; }
.ef-input {
  padding:10px 12px; background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--radius); font-size:14px; font-weight:600; font-family:var(--mono);
  color:var(--text); outline:none; transition:border-color .2s, box-shadow .2s; width:100%;
}
.ef-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-glow); }
.ef-input::placeholder { color:var(--text3); font-weight:400; }
.ef-btn {
  padding:10px 20px; background:var(--blue); border:none; border-radius:var(--radius);
  font-size:13px; font-weight:600; font-family:var(--font); color:#fff; cursor:pointer;
  transition:background .2s, transform .1s; white-space:nowrap; align-self:end;
}
.ef-btn:hover { background:#79b8ff; }
.ef-btn:active { transform:scale(.97); }

/* history table */
.cr-history { width:100%; border-collapse:collapse; font-size:13px; }
.cr-history thead th { padding:9px 12px; text-align:right; font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; border-bottom:1px solid var(--border); }
.cr-history thead th:first-child { text-align:left; }
.cr-history tbody td { padding:9px 12px; text-align:right; border-bottom:1px solid var(--border); font-family:var(--mono); font-size:12px; color:var(--text2); }
.cr-history tbody td:first-child { text-align:left; color:var(--text); font-family:var(--font); font-size:13px; }
.cr-history tbody tr:hover td { background:var(--bg3); }
.delta-up   { color:var(--green)!important; font-weight:600!important; }
.delta-down { color:var(--red)!important; font-weight:600!important; }
.delta-flat { color:var(--text3)!important; }

.del-btn { background:none; border:none; color:var(--text3); cursor:pointer; font-size:13px; padding:2px 6px; border-radius:4px; transition:color .15s,background .15s; }
.del-btn:hover { color:var(--red); background:var(--red-bg); }

/* advice boxes */
.advice-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:600px){ .advice-grid { grid-template-columns:1fr; } }
.advice-item {
  display:flex; gap:12px; padding:14px 16px;
  background:var(--bg3); border-radius:var(--radius);
  border-left:3px solid transparent;
}
.adv-icon { font-size:20px; flex-shrink:0; }
.adv-title { font-size:13px; font-weight:600; margin-bottom:3px; }
.adv-desc  { font-size:12px; color:var(--text2); line-height:1.6; }
.adv-tag   { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; margin-top:5px; letter-spacing:.04em; text-transform:uppercase; }

/* milestone bar */
.milestone-track { position:relative; margin:16px 0 8px; }
.milestone-bar { height:8px; background:var(--bg4); border-radius:4px; overflow:visible; position:relative; }
.milestone-fill { height:8px; border-radius:4px; background:linear-gradient(90deg,var(--red),var(--amber),var(--green)); transition:width .8s cubic-bezier(.4,0,.2,1); }
.milestone-pins { position:relative; display:flex; justify-content:space-between; margin-top:6px; }
.mpin { text-align:center; font-size:10px; font-family:var(--mono); }
.mpin .mp-score { font-weight:600; }
.mpin .mp-label { color:var(--text3); font-size:9px; display:block; }
.mpin.reached .mp-score { color:var(--green); }
.mpin.current-pos { position:absolute; top:-22px; transform:translateX(-50%); }
.mpin.current-pos .mp-score { color:var(--blue); font-size:11px; background:var(--bg); border:1px solid var(--blue); padding:1px 6px; border-radius:4px; }

/* utilization ring */
.util-ring { display:flex; align-items:center; gap:20px; padding:16px 20px; background:var(--bg3); border-radius:var(--radius-lg); }
.util-circle { position:relative; width:72px; height:72px; flex-shrink:0; }
.util-circle svg { transform:rotate(-90deg); }
.util-pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; font-family:var(--mono); }
.util-info .util-title { font-size:14px; font-weight:600; margin-bottom:4px; }
.util-info .util-sub   { font-size:12px; color:var(--text2); line-height:1.6; }
</style>
</head>
<body>

<div class="quote-banner" aria-live="polite">
  <div class="quote-slot">
    <div class="quote-visible show" id="qA"></div>
    <div class="quote-visible hide" id="qB"></div>
  </div>
</div>

<div class="shell">

  <header class="header">
    <div>
      <div class="wordmark">Wealth Builder · Montreal QC</div>
      <div class="tagline">7-Year Path to <span>$620K+</span></div>
    </div>
    <div class="header-meta">2025 · $49K net income</div>
  </header>

  <div class="kpi-strip" id="kpiStrip"></div>

  <nav class="nav">
    <button class="nav-btn active" onclick="go('assumptions',this)">Assumptions</button>
    <button class="nav-btn" onclick="go('monthly',this)">Monthly Tracker</button>
    <button class="nav-btn" onclick="go('budget',this)">Budget</button>
    <button class="nav-btn" onclick="go('capital',this)">Capital Build</button>
    <button class="nav-btn" onclick="go('projection',this)">8-Year View</button>
    <button class="nav-btn" onclick="go('howto',this)">Guide</button>
    <button class="nav-btn" onclick="go('credit',this)">📈 Credit Score</button>
  </nav>

  <div id="panel-assumptions" class="panel active"></div>
  <div id="panel-monthly"     class="panel"></div>
  <div id="panel-budget"      class="panel"></div>
  <div id="panel-capital"     class="panel"></div>
  <div id="panel-projection"  class="panel"></div>
  <div id="panel-howto"       class="panel"></div>
  <div id="panel-credit"      class="panel"></div>

</div>

<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

const DEFAULTS={
  net_income:49000,rent:447,phone:50,gym:50,internet:50,
  food:500,transport:250,misc:300,
  rrsp_mo:900,tfsa_mo:600,re_mo:900,
  tax_rate:35,port_return:7,re_growth:4,
  prop1_price:500000,prop1_dp:10,
  prop2_price:600000,prop2_dp:10
};

let A={...DEFAULTS}, M={};

function load(){
  try{const a=localStorage.getItem('wb3_asm');if(a)A={...DEFAULTS,...JSON.parse(a)};const m=localStorage.getItem('wb3_mon');if(m)M=JSON.parse(m);}catch(e){}
}
function save(){
  try{localStorage.setItem('wb3_asm',JSON.stringify(A));localStorage.setItem('wb3_mon',JSON.stringify(M));}catch(e){}
}
function getM(yr,mo){
  const k=`${yr}-${mo}`;
  if(!M[k])M[k]={rrsp:0,tfsa:0,re:0,refund:0,checks:[false,false,false,false],note:''};
  return M[k];
}

function C(){
  const mo_net=A.net_income/12,fix=A.rent+A.phone+A.gym+A.internet,vari=A.food+A.transport+A.misc;
  const mo_inv=A.rrsp_mo+A.tfsa_mo+A.re_mo,mo_free=mo_net-fix-vari-mo_inv;
  const yr_rrsp=A.rrsp_mo*12,refund=yr_rrsp*(A.tax_rate/100);
  const yr_inv=mo_inv*12,yr_total=yr_inv+refund;
  return{mo_net,fix,vari,mo_inv,mo_free,yr_rrsp,refund,yr_inv,yr_total,sav:mo_inv/mo_net,house:A.rent/mo_net};
}

function fm(n){return '$'+(Math.round(n||0)).toLocaleString();}
function fp(v,t){return t===0?0:Math.min(100,Math.round(v/t*100));}
function fpc(v){return Math.round(v*100)+'%';}

function renderKPI(){
  const c=C();
  document.getElementById('kpiStrip').innerHTML=`
    <div class="kpi green"><div class="kpi-label">Monthly invested</div><div class="kpi-value">${fm(c.mo_inv)}</div><div class="kpi-sub">${fpc(c.sav)} savings rate</div></div>
    <div class="kpi blue"><div class="kpi-label">Annual from savings</div><div class="kpi-value">${fm(c.yr_inv)}</div><div class="kpi-sub">+${fm(c.refund)} refund in April</div></div>
    <div class="kpi amber"><div class="kpi-label">Total per year</div><div class="kpi-value">${fm(c.yr_total)}</div><div class="kpi-sub">yr 2 cumulative ~${fm(c.yr_total*2)}</div></div>
    <div class="kpi purp"><div class="kpi-label">Housing ratio</div><div class="kpi-value">${fpc(c.house)}</div><div class="kpi-sub">vs 30–40% Cdn avg</div></div>`;
}

const renders={assumptions:renderAssumptions,monthly:renderMonthly,budget:renderBudget,capital:renderCapital,projection:renderProjection,howto:renderHowto,credit:renderCredit};

function go(name,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  renders[name]();
}

function frow(key,label,note,isPct){
  const val=A[key];
  return `<div class="field-row" onclick="this.querySelector('input').focus()">
    <div class="field-left">
      <div class="field-label">${label}</div>
      ${note?`<div class="field-note">${note}</div>`:''}
    </div>
    <div class="field-right">
      ${!isPct?'<span class="field-prefix">$</span>':''}
      <input class="field-input" type="number" id="f-${key}" value="${val}"
        ${isPct?'min="1" max="99" step="1"':'min="0"'}
        oninput="updA('${key}',this.value,${!!isPct})">
      ${isPct?'<span class="field-prefix">%</span>':''}
    </div>
  </div>`;
}

function renderAssumptions(){
  const c=C();
  document.getElementById('panel-assumptions').innerHTML=`
  <div class="two-col">
    <div>
      <div class="card">
        <div class="section-label">Income</div>
        ${frow('net_income','Annual net income','After all taxes, before investing')}
        <div class="calc-row highlight"><span class="lbl">Monthly net income</span><span class="val" id="c-mo_net">${fm(c.mo_net)}</span></div>
      </div>
      <div class="card">
        <div class="section-label">Fixed monthly expenses</div>
        ${frow('rent','Rent','Your biggest competitive advantage')}
        ${frow('phone','Phone','')}
        ${frow('gym','Gym','')}
        ${frow('internet','Internet','')}
        <div class="calc-row"><span class="lbl">Total fixed</span><span class="val" id="c-fix">${fm(c.fix)}</span></div>
      </div>
      <div class="card">
        <div class="section-label">Variable monthly expenses</div>
        ${frow('food','Food','')}
        ${frow('transport','Transport','')}
        ${frow('misc','Miscellaneous','')}
        <div class="calc-row"><span class="lbl">Total variable</span><span class="val" id="c-vari">${fm(c.vari)}</span></div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="section-label">Monthly investment targets</div>
        ${frow('rrsp_mo','RRSP',`${fm(A.rrsp_mo*12)}/yr · tax refund arrives April`)}
        ${frow('tfsa_mo','TFSA','Tax-free growth — forever')}
        ${frow('re_mo','Real estate fund','Building toward down payment')}
        <div class="calc-row highlight"><span class="lbl">Total monthly invested</span><span class="val" id="c-mo_inv">${fm(c.mo_inv)}</span></div>
        <div class="calc-row"><span class="lbl">Free cash flow (buffer)</span><span class="val" id="c-mo_free">${fm(c.mo_free)}</span></div>
      </div>
      <div class="card" style="border-color:rgba(227,179,65,.25)">
        <div class="section-label" style="color:var(--amber)">RRSP tax refund — April only</div>
        <div class="calc-row amber-row" style="margin-bottom:10px"><span class="lbl">Annual RRSP contribution</span><span class="val" id="c-yr_rrsp">${fm(c.yr_rrsp)}</span></div>
        ${frow('tax_rate','Quebec marginal rate','~35% combined fed + provincial',true)}
        <div class="calc-row amber-row" style="margin-top:8px">
          <span class="lbl" style="font-weight:600;color:var(--amber)">Estimated refund</span>
          <span class="val" id="c-refund" style="color:var(--amber);font-size:18px">${fm(c.refund)}</span>
        </div>
        <div class="info-box">Arrives <strong>once per year in April</strong> after filing Quebec taxes. Reinvest 100% to real estate fund immediately. Do not spend it.</div>
      </div>
      <div class="card">
        <div class="section-label">Growth assumptions</div>
        ${frow('port_return','Portfolio annual return','Conservative 7% baseline',true)}
        ${frow('re_growth','Real estate appreciation','Conservative 4% baseline',true)}
        <div class="divider"></div>
        ${frow('prop1_price','Target duplex price','Year 2 purchase')}
        ${frow('prop1_dp','Down payment % — property 1','10% = '+fm(A.prop1_price*A.prop1_dp/100),true)}
        ${frow('prop2_price','Target property 2 price','Year 5–6 via refinance')}
        ${frow('prop2_dp','Down payment % — property 2','Funded via equity refinance',true)}
      </div>
    </div>
  </div>`;
}

function updA(key,val,isPct){
  A[key]=parseFloat(val)||0;
  save(); renderKPI();
  const c=C();
  const map={'c-mo_net':fm(c.mo_net),'c-fix':fm(c.fix),'c-vari':fm(c.vari),'c-mo_inv':fm(c.mo_inv),'c-mo_free':fm(c.mo_free),'c-yr_rrsp':fm(c.yr_rrsp),'c-refund':fm(c.refund)};
  for(const[id,v]of Object.entries(map)){
    const el=document.getElementById(id);
    if(el){el.textContent=v;el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}
  }
}

function renderMonthly(){
  const yr=2025,cm=new Date().getMonth(),c=C();
  let html='<div class="month-grid">';
  for(let i=0;i<12;i++){
    const m=getM(yr,i),isApr=i===3,isCur=i===cm,isPast=i<cm;
    const tot=m.rrsp+m.tfsa+m.re+m.refund;
    const target=c.mo_inv+(isApr?c.refund:0);
    const p=fp(tot,target);
    const bc=isPast?'badge-green':isCur?'badge-blue':'badge-gray';
    const bt=isPast?'Done':isCur?'This month':'Upcoming';
    const cc=['month-card',isCur?'current':'',isApr?'april':''].filter(Boolean).join(' ');
    const barColor=isApr?'var(--amber)':isCur?'var(--blue)':'var(--green)';
    html+=`<div class="${cc}">
      <div class="month-head"><span class="month-name">${MONTHS[i]}${isApr?' 🍁':''}</span><span class="badge ${bc}">${bt}</span></div>
      <div class="prog-wrap">
        <div class="prog-meta"><span class="prog-label">Progress</span><span>${p}% · ${fm(tot)} of ${fm(target)}</span></div>
        <div class="prog-bg"><div class="prog-fill" style="width:${p}%;background:${barColor}"></div></div>
      </div>
      ${isApr?`<div class="april-note">⚡ Tax refund month — add ~${fm(c.refund)} in the refund field below</div>`:''}
      <div class="alloc"><span class="alloc-label">RRSP</span><div class="alloc-bar-bg"><div class="alloc-bar" style="width:${fp(m.rrsp,A.rrsp_mo)}%;background:var(--blue)"></div></div><span class="alloc-amount" style="color:var(--blue)">${fm(m.rrsp)}</span></div>
      <div class="alloc"><span class="alloc-label">TFSA</span><div class="alloc-bar-bg"><div class="alloc-bar" style="width:${fp(m.tfsa,A.tfsa_mo)}%;background:var(--green)"></div></div><span class="alloc-amount" style="color:var(--green)">${fm(m.tfsa)}</span></div>
      <div class="alloc"><span class="alloc-label">RE Fund</span><div class="alloc-bar-bg"><div class="alloc-bar" style="width:${fp(m.re,A.re_mo)}%;background:var(--amber)"></div></div><span class="alloc-amount" style="color:var(--amber)">${fm(m.re)}</span></div>
      ${isApr?`<div class="alloc"><span class="alloc-label">Refund</span><div class="alloc-bar-bg"><div class="alloc-bar" style="width:${fp(m.refund,c.refund)}%;background:var(--amber)"></div></div><span class="alloc-amount" style="color:var(--amber)">${fm(m.refund)}</span></div>`:''}
      <div class="month-inputs ${isApr?'april-grid':''}">
        <div class="minput-wrap"><div class="minput-label">RRSP</div><span class="dollar-pfx">$</span><input class="minput" type="number" min="0" placeholder="0" value="${m.rrsp||''}" oninput="updM(${yr},${i},'rrsp',this.value)"></div>
        <div class="minput-wrap"><div class="minput-label">TFSA</div><span class="dollar-pfx">$</span><input class="minput" type="number" min="0" placeholder="0" value="${m.tfsa||''}" oninput="updM(${yr},${i},'tfsa',this.value)"></div>
        <div class="minput-wrap"><div class="minput-label">RE Fund</div><span class="dollar-pfx">$</span><input class="minput" type="number" min="0" placeholder="0" value="${m.re||''}" oninput="updM(${yr},${i},'re',this.value)"></div>
        ${isApr?`<div class="minput-wrap"><div class="minput-label" style="color:var(--amber)">Refund</div><span class="dollar-pfx" style="color:var(--amber)">$</span><input class="minput amber-inp" type="number" min="0" placeholder="0" value="${m.refund||''}" oninput="updM(${yr},${i},'refund',this.value)"></div>`:''}
      </div>
      <div class="check-list">
        ${['RRSP transfer sent','TFSA transfer sent','RE Fund transfer sent',...(isApr?['Tax refund reinvested']:[])].map((lbl,j)=>`
        <div class="check-item ${m.checks[j]?'checked':''}" onclick="chkM(${yr},${i},${j})">
          <div class="chk-box"><svg class="chk-svg" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          ${lbl}
        </div>`).join('')}
      </div>
      <textarea class="mnote" placeholder="Notes for ${MONTHS[i]}…" oninput="noteM(${yr},${i},this.value)">${m.note||''}</textarea>
      <div class="month-footer"><span>Total contributed</span><span class="ftotal">${fm(tot)}</span></div>
    </div>`;
  }
  html+='</div>';
  document.getElementById('panel-monthly').innerHTML=html;
}

function updM(yr,mo,field,val){
  getM(yr,mo)[field]=parseFloat(val)||0; save(); renderKPI();
  const m=getM(yr,mo),c=C(),tot=m.rrsp+m.tfsa+m.re+m.refund,target=c.mo_inv+(mo===3?c.refund:0),p=fp(tot,target);
  const card=document.querySelectorAll('.month-card')[mo];
  if(!card)return;
  const pf=card.querySelector('.prog-fill'); if(pf)pf.style.width=p+'%';
  const pm=card.querySelectorAll('.prog-meta span'); if(pm[1])pm[1].textContent=`${p}% · ${fm(tot)} of ${fm(target)}`;
  const bars=card.querySelectorAll('.alloc-bar'),amts=card.querySelectorAll('.alloc-amount');
  if(bars[0])bars[0].style.width=fp(m.rrsp,A.rrsp_mo)+'%';
  if(bars[1])bars[1].style.width=fp(m.tfsa,A.tfsa_mo)+'%';
  if(bars[2])bars[2].style.width=fp(m.re,A.re_mo)+'%';
  if(amts[0])amts[0].textContent=fm(m.rrsp);
  if(amts[1])amts[1].textContent=fm(m.tfsa);
  if(amts[2])amts[2].textContent=fm(m.re);
  if(mo===3&&bars[3])bars[3].style.width=fp(m.refund,c.refund)+'%';
  if(mo===3&&amts[3])amts[3].textContent=fm(m.refund);
  const ft=card.querySelector('.ftotal'); if(ft)ft.textContent=fm(tot);
}
function chkM(yr,mo,j){const m=getM(yr,mo);m.checks[j]=!m.checks[j];save();renderMonthly();}
function noteM(yr,mo,val){getM(yr,mo).note=val;save();}

function renderBudget(){
  const c=C();
  document.getElementById('panel-budget').innerHTML=`
  <div class="two-col">
    <div>
      <div class="card">
        <div class="bsection-title">Income</div>
        <div class="budget-line"><span class="blabel">Monthly net income</span><span class="bval">${fm(c.mo_net)}</span></div>
        <div class="bsection-title">Fixed expenses</div>
        <div class="budget-line"><span class="blabel">Rent</span><span class="bval">${fm(A.rent)}</span></div>
        <div class="budget-line"><span class="blabel">Phone</span><span class="bval">${fm(A.phone)}</span></div>
        <div class="budget-line"><span class="blabel">Gym</span><span class="bval">${fm(A.gym)}</span></div>
        <div class="budget-line"><span class="blabel">Internet</span><span class="bval">${fm(A.internet)}</span></div>
        <div class="budget-line subtotal"><span class="blabel">Total fixed</span><span class="bval">${fm(c.fix)}</span></div>
        <div class="bsection-title">Variable expenses</div>
        <div class="budget-line"><span class="blabel">Food</span><span class="bval">${fm(A.food)}</span></div>
        <div class="budget-line"><span class="blabel">Transport</span><span class="bval">${fm(A.transport)}</span></div>
        <div class="budget-line"><span class="blabel">Miscellaneous</span><span class="bval">${fm(A.misc)}</span></div>

function gaugeArc(score, color){
  const min=300,max=900,pct=(score-min)/(max-min);
  const r=50, cx=60, cy=60;
  const startA=-Math.PI, endA=0;
  const angle=startA+(endA-startA)*pct;
  const x=cx+r*Math.cos(angle), y=cy+r*Math.sin(angle);
  const bgPath=`M ${cx-r},${cy} A ${r},${r} 0 0,1 ${cx+r},${cy}`;
  const fillPath=pct>0?`M ${cx-r},${cy} A ${r},${r} 0 0,1 ${x},${y}`:'';
  return `<svg viewBox="0 0 120 65" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="${bgPath}" stroke="rgba(255,255,255,.07)" stroke-width="10" fill="none" stroke-linecap="round"/>
    ${fillPath?`<path d="${fillPath}" stroke="${color}" stroke-width="10" fill="none" stroke-linecap="round"/>`:''}
    <circle cx="${x}" cy="${y}" r="5" fill="${color}"/>
  </svg>`;
}

function ccCalendarHTML(score){
  const today = new Date();
  const todayMonth = today.getMonth(); // 0-indexed
  const todayYear  = today.getFullYear();

  // Generate 6 months (2 past + current + 3 future)
  const months = [];
  for(let i=-2; i<=3; i++){
    let m = todayMonth + i;
    let y = todayYear;
    while(m < 0){ m+=12; y--; }
    while(m > 11){ m-=12; y++; }
    months.push({m, y});
  }

  const MNAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

  // Score-based advice
  const scoreColor = score >= 750 ? 'var(--green)' : score >= 700 ? 'var(--amber)' : 'var(--text3)';

function addCR(){
  const date=document.getElementById('cr-date').value;
  const eq=parseInt(document.getElementById('cr-eq').value)||0;
  const tu=parseInt(document.getElementById('cr-tu').value)||0;
  const note=document.getElementById('cr-note').value.trim();
  if(!date||!eq||!tu){ alert('Please fill in month, Equifax, and TransUnion scores.'); return; }
  const d=new Date(date+'-01');
  const label=d.toLocaleString('en-CA',{month:'long',year:'numeric'});
  // Remove duplicate date if exists
  CR=CR.filter(r=>r.date!==date);
  CR.push({date,label,eq,tu,note});
  CR.sort((a,b)=>a.date.localeCompare(b.date));
  saveCR(); renderCredit();
}

function delCR(idx){
  if(CR.length<=1){ alert('Keep at least one entry.'); return; }
  CR.splice(idx,1); saveCR(); renderCredit();
}

    {text:"An investment in knowledge pays the best interest.",attr:"Benjamin Franklin"},
  ];

  function qHTML(q){
    return `<span class="q-text">"${q.text}"</span><span class="q-sep">·</span><span class="q-attr">${q.attr}</span>`;
  }

  const elA=document.getElementById('qA');
  const elB=document.getElementById('qB');
  let idx=0, useA=true;

  elA.innerHTML=qHTML(quotes[0]);

  setInterval(()=>{
    idx=(idx+1)%quotes.length;
